<!-- ADD EXPENSE SECTION (STANDALONE PAGE VIEW) -->
<section id="section-add-expense" class="content-section hidden">
    <header class="section-header">
        <h1>Add Expense</h1>
        <p>Create a new expense entry with categorization and details.</p>
    </header>

    <div class="content-card form-card">
        <form id="standalone-add-expense-form" class="standalone-form">
            <div class="input-group" id="amount-input-group">
                <label for="add-amount">Amount ({{ active_currency_symbol or '₹' }}) <span class="required">*</span></label>
                <input type="number" id="add-amount" step="0.01" min="0.01" required placeholder="0.00">
                <button type="button" id="btn-add-item-to-list" class="btn-secondary" style="margin-top: 8px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 6px 12px; border-radius: 6px; font-weight: 500; font-size: 0.9rem;"><i class="fa-solid fa-plus"></i> ADD</button>
            </div>
            <div class="input-group">
                <label for="add-category">Category <span class="required">*</span></label>
                <div style="display: flex; gap: 8px; width: 100%;">
                    <select id="add-category" required style="flex-grow: 1;">
                        <option value="" disabled selected>Select Category</option>
                        <!-- Dynamic Options -->
                    </select>
                    <button type="button" class="btn-primary btn-sm inline-add-btn" data-type="category" style="padding: 0 12px; border-radius: 6px;" title="Add Category Inline"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
            <div class="input-group hidden" id="add-category-other-wrapper">
                <label for="add-category-other">Specify Custom Category <span class="required">*</span></label>
                <input type="text" id="add-category-other" placeholder="e.g. Stocks Gain">
            </div>
            <div class="input-group">
                <label for="add-date">Date <span class="required">*</span></label>
                <input type="date" id="add-date" required>
            </div>
            <div class="input-group">
                <label for="add-bank-mode">Bank Mode</label>
                <div style="display: flex; gap: 8px; width: 100%;">
                    <select id="add-bank-mode" style="flex-grow: 1;">
                        <option value="" selected>None / N/A</option>
                        <!-- Dynamic Options -->
                    </select>
                    <button type="button" class="btn-primary btn-sm inline-add-btn" data-type="bank-mode" style="padding: 0 12px; border-radius: 6px;" title="Add Bank Mode Inline"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
            <div class="input-group">
                <label for="add-payment-type">Payment Gateway</label>
                <div style="display: flex; gap: 8px; width: 100%;">
                    <select id="add-payment-type" style="flex-grow: 1;">
                        <option value="" selected>None / N/A</option>
                        <!-- Dynamic Options -->
                    </select>
                    <button type="button" class="btn-primary btn-sm inline-add-btn" data-type="payment-type" style="padding: 0 12px; border-radius: 6px;" title="Add Payment Gateway Inline"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
            <div class="input-group">
                <label for="add-payment-method">Payment Method <span class="required">*</span></label>
                <select id="add-payment-method" required>
                    <option value="Debit" selected>Debit</option>
                    <option value="Credit">Credit</option>
                </select>
            </div>
            <div class="input-group">
                <label for="add-payment-category">Payment Source</label>
                <div style="display: flex; gap: 8px; width: 100%;">
                    <select id="add-payment-category" style="flex-grow: 1;">
                        <option value="" selected>None / N/A</option>
                        <!-- Dynamic Options -->
                    </select>
                    <button type="button" class="btn-primary btn-sm inline-add-btn" data-type="payment-category" style="padding: 0 12px; border-radius: 6px;" title="Add Payment Source Inline"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
             <div class="input-group hidden" id="add-interest-wrapper">
                 <label for="add-interest">Interest ({{ active_currency_symbol or '₹' }})</label>
                 <input type="number" id="add-interest" step="0.01" min="0" placeholder="0.00">
             </div>
             <div class="input-group">
                 <label for="add-createddate">Created Date <span class="required">*</span></label>
                 <input type="date" id="add-createddate" required>
             </div>
            
            <!-- Dynamic custom fields container -->
            <div id="add-expense-custom-fields" class="input-group-full" style="display: contents;">
                <!-- Dynamic custom fields rendered by JS -->
            </div>
            
            <div class="input-group" id="add-status-wrapper" style="display: flex; align-items: center; gap: 8px; flex-direction: row; margin-top: 25px;">
                <input type="checkbox" id="add-status" checked style="width: 18px; height: 18px; cursor: pointer; margin: 0;">
                <label for="add-status" style="margin: 0; cursor: pointer; font-weight: 500; font-size: 0.95rem;">Paid</label>
            </div>
            <div class="input-group input-group-full">
                <label for="add-description">Description</label>
                <input type="text" id="add-description" placeholder="e.g. Grocery shopping">
            </div>
            
            <!-- Pending Added Expenses List Table -->
            <div id="added-expenses-list-container" class="input-group-full hidden" style="margin-top: 20px; margin-bottom: 20px;">
                <h3 style="margin-bottom: 10px; font-size: 1rem; color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 8px;">Pending Expense List</h3>
                <div style="overflow-x: auto;">
                    <table class="data-table" style="width: 100%;">
                        <thead>
                            <tr>
                                <th>Amount</th>
                                <th>Category</th>
                                <th>Date</th>
                                <th>Description</th>
                                <th style="width: 80px;" class="text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="added-expenses-list-tbody">
                            <!-- Dynamically added rows -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="form-actions">
                <button type="reset" class="btn-secondary" id="add-expense-reset-btn">Reset</button>
                <button type="submit" class="btn-primary">Add Expense</button>
            </div>
        </form>
    </div>
</section>

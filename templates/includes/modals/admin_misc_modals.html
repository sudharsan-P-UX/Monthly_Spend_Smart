<!-- EDIT USER MODAL -->
<div id="change-user-password-modal" class="modal-overlay hidden">
    <div class="modal-card">
        <div class="modal-header">
            <h2>Edit User Details</h2>
            <button class="btn-close" onclick="closeChangePasswordModal()">&times;</button>
        </div>
        <form id="change-user-password-form" class="modal-form">
            <input type="hidden" id="change-user-id">
            <div style="margin-bottom: 15px;">
                <span style="color: var(--text-secondary); font-size: 0.9rem;">Editing user: </span>
                <strong id="change-user-username" style="color: var(--text-primary); font-size: 0.95rem;"></strong>
            </div>
            <div class="input-group">
                <label for="change-user-firstname">First Name</label>
                <input type="text" id="change-user-firstname" placeholder="Enter first name">
            </div>
            <div class="input-group">
                <label for="change-user-lastname">Last Name</label>
                <input type="text" id="change-user-lastname" placeholder="Enter last name">
            </div>
            <div class="input-group">
                <label for="change-user-email">Email</label>
                <input type="email" id="change-user-email" placeholder="Enter email">
            </div>
            <div class="input-group">
                <label for="change-user-phone">Phone</label>
                <input type="tel" id="change-user-phone" placeholder="Enter phone">
            </div>
            <div class="input-group" style="position: relative;">
                <label for="change-user-new-password">New Password <span style="font-size: 0.8em; font-weight: 400; color: var(--text-muted);">(Leave blank to keep current)</span></label>
                <input type="password" id="change-user-new-password" placeholder="Enter new password (min 6 chars)">
                <i class="fa-solid fa-eye" style="position: absolute; right: 15px; top: 38px; cursor: pointer; color: var(--text-muted);" onclick="togglePasswordVisibility('change-user-new-password', this)"></i>
            </div>
            <div class="input-group" style="position: relative;">
                <label for="change-user-confirm-password">Confirm Password</label>
                <input type="password" id="change-user-confirm-password" placeholder="Confirm new password">
                <i class="fa-solid fa-eye" style="position: absolute; right: 15px; top: 38px; cursor: pointer; color: var(--text-muted);" onclick="togglePasswordVisibility('change-user-confirm-password', this)"></i>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="closeChangePasswordModal()">Cancel</button>
                <button type="submit" class="btn-primary">Update User</button>
            </div>
        </form>
    </div>
</div>

<!-- OVERVIEW DETAILS MODAL -->
<div id="overview-details-modal" class="modal-overlay hidden">
    <div class="modal-card" style="max-width: 800px; width: 90%;">
        <div class="modal-header">
            <h2 id="overview-details-title">Calculation Details</h2>
            <button class="btn-close" onclick="closeOverviewDetailsModal()">&times;</button>
        </div>
        <div style="padding: 15px 25px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <div>
                <span style="color: var(--text-secondary); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px;">Formula / Filter</span>
                <div style="font-weight: 500; font-size: 0.95rem; color: var(--text-primary); margin-top: 2px;" id="overview-details-formula">Sum of contributing items</div>
            </div>
            <div class="text-right">
                <span style="color: var(--text-secondary); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px;">Calculated Sum</span>
                <div style="font-weight: 600; font-size: 1.2rem; color: var(--color-success); margin-top: 2px;" id="overview-details-total">Total: ₹0.00</div>
            </div>
        </div>
        <div class="modal-body" style="padding: 20px;">
            <div class="table-container" style="max-height: 400px; overflow-y: auto;">
                <table class="expense-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Description</th>
                            <th>Method</th>
                            <th>Bank / Gateway</th>
                            <th class="text-right">Amount</th>
                            <th class="text-right">Interest</th>
                        </tr>
                    </thead>
                    <tbody id="overview-details-tbody">
                        <!-- Dynamic items -->
                    </tbody>
                </table>
            </div>
        </div>
        <div class="modal-footer" style="padding: 15px 20px; display: flex; justify-content: flex-end;">
            <button class="btn-secondary" onclick="closeOverviewDetailsModal()">Close</button>
        </div>
    </div>
</div>

<!-- INLINE CONTROL ITEM CREATION MODAL -->
<div id="inline-control-modal" class="modal-overlay hidden" style="z-index: 1100;">
    <div class="modal-card" style="max-width: 400px;">
        <div class="modal-header">
            <h2 id="inline-control-modal-title">Add New Item</h2>
            <button type="button" class="btn-close" onclick="closeInlineControlModal()">&times;</button>
        </div>
        <form id="inline-control-form" class="modal-form">
            <input type="hidden" id="inline-control-type">
            <div class="input-group">
                <label for="inline-control-name">Name <span class="required">*</span></label>
                <input type="text" id="inline-control-name" required placeholder="e.g. Shopping">
            </div>
            <div class="input-group">
                <label for="inline-control-order">Display Order</label>
                <input type="number" id="inline-control-order" placeholder="0">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="closeInlineControlModal()">Cancel</button>
                <button type="submit" class="btn-primary">Create</button>
            </div>
        </form>
    </div>
</div>

<!-- EDIT DROPDOWN ITEM MODAL -->
<div id="admin-edit-dropdown-modal" class="modal-overlay hidden" style="z-index: 1050;">
    <div class="modal-card" style="max-width: 400px;">
        <div class="modal-header">
            <h2 id="admin-edit-dropdown-title">Edit Dropdown Item</h2>
            <button type="button" class="btn-close" onclick="closeModal('admin-edit-dropdown-modal')">&times;</button>
        </div>
        <form id="admin-edit-dropdown-form" class="modal-form">
            <input type="hidden" id="admin-edit-dropdown-id">
            <input type="hidden" id="admin-edit-dropdown-type">
            <input type="hidden" id="admin-edit-dropdown-index">
            <div class="input-group">
                <label for="admin-edit-dropdown-name">Name <span class="required">*</span></label>
                <input type="text" id="admin-edit-dropdown-name" required placeholder="Enter name">
            </div>
            <div class="input-group">
                <label for="admin-edit-dropdown-order">Display Order</label>
                <input type="number" id="admin-edit-dropdown-order" placeholder="0">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="closeModal('admin-edit-dropdown-modal')">Cancel</button>
                <button type="submit" class="btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<!-- EDIT COLUMN DETAILS MODAL -->
<div id="admin-edit-column-modal" class="modal-overlay hidden" style="z-index: 1050;">
    <div class="modal-card" style="max-width: 450px;">
        <div class="modal-header">
            <h2 id="admin-edit-column-title">Edit Column Details</h2>
            <button type="button" class="btn-close" onclick="closeModal('admin-edit-column-modal')">&times;</button>
        </div>
        <form id="admin-edit-column-form" class="modal-form" style="padding: 20px;">
            <input type="hidden" id="admin-edit-column-key">
            <input type="hidden" id="admin-edit-column-target">
            <input type="hidden" id="admin-edit-column-context">
            
            <div class="input-group">
                <label for="admin-edit-column-label">Column Label / Header <span class="required">*</span></label>
                <input type="text" id="admin-edit-column-label" required placeholder="Enter column header label">
            </div>
            
            <div class="input-group">
                <label>Database Field Key</label>
                <input type="text" id="admin-edit-column-display-key" disabled style="background-color: var(--background-card-hover); cursor: not-allowed; color: var(--text-secondary);">
            </div>
            
            <div class="input-group">
                <label for="admin-edit-column-order">Display Order</label>
                <input type="number" id="admin-edit-column-order" placeholder="0">
            </div>
            
            <div class="input-group">
                <label for="admin-edit-column-parent">Parent Column (Optional)</label>
                <select id="admin-edit-column-parent" class="modal-select">
                    <option value="">None</option>
                </select>
            </div>
            
            <div class="input-group">
                <label for="admin-edit-column-trigger">Parent Trigger Value</label>
                <input type="text" id="admin-edit-column-trigger" placeholder="e.g. Yes">
            </div>
            
            <div class="checkbox-group" style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
                <label class="checkbox-container" style="display: inline-flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="admin-edit-column-import">
                    <span class="checkmark"></span>
                    <span>Enable Import</span>
                </label>
                <label class="checkbox-container" style="display: inline-flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="admin-edit-column-export">
                    <span class="checkmark"></span>
                    <span>Enable Export</span>
                </label>
            </div>
            
            <div class="modal-footer" style="margin-top: 20px;">
                <button type="button" class="btn-secondary" onclick="closeModal('admin-edit-column-modal')">Cancel</button>
                <button type="submit" class="btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>

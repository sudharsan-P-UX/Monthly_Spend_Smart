<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Monthly Expense Tracker</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Link CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="auth-body">
    <!-- Blurry blobs for styling -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <div class="auth-container">
        <!-- Auth Card -->
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-icon">
                    <i class="fa-solid fa-wallet"></i>
                </div>
                <h2>SpendSmart</h2>
                <p>Track. Analyze. Save.</p>
            </div>
            
            <!-- Alert message area -->
            <div id="auth-alert" class="alert hidden">
                <span class="alert-message"></span>
                <button class="alert-close" onclick="closeAlert()">&times;</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form">
                <div class="form-title">Welcome Back</div>
                <div class="input-group">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" id="login-username" placeholder="Username" required minlength="3">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="login-password" placeholder="Password" required minlength="6">
                </div>
                <button type="submit" class="btn-primary auth-submit">
                    <span>Log In</span> <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
                <div class="auth-switch">
                    Don't have an account? <a href="#" id="show-register">Register</a>
                </div>
                <div class="auth-switch" style="margin-top: 10px;">
                    Forgot password? <a href="#" id="show-change-password">Change Password</a>
                </div>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form hidden">
                <div class="form-title">Create Account</div>
                <div class="input-group">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" id="register-username" placeholder="Choose Username" required minlength="3">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="register-password" placeholder="Password (Min 6 chars)" required minlength="6">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock-open input-icon"></i>
                    <input type="password" id="register-confirm" placeholder="Confirm Password" required minlength="6">
                </div>
                <button type="submit" class="btn-primary auth-submit">
                    <span>Register</span> <i class="fa-solid fa-user-plus"></i>
                </button>
                <div class="auth-switch">
                    Already have an account? <a href="#" id="show-login">Log In</a>
                </div>
            </form>

            <!-- Change Password Form -->
            <form id="change-password-form" class="auth-form hidden">
                <div class="form-title">Change Password</div>
                <div class="input-group" style="position: relative;">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" id="change-username" placeholder="Username" required minlength="3" style="padding-right: 110px;">
                    <span id="username-verify-indicator" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 0.8rem; font-weight: 600; pointer-events: none;"></span>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="change-password" placeholder="New Password (Min 6 chars)" required minlength="6">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock-open input-icon"></i>
                    <input type="password" id="change-confirm" placeholder="Confirm New Password" required minlength="6">
                </div>
                <button type="submit" class="btn-primary auth-submit">
                    <span>Submit</span> <i class="fa-solid fa-key"></i>
                </button>
                <div class="auth-switch">
                    Remembered password? <a href="#" id="show-login-from-change">Log In</a>
                </div>
            </form>
        </div>
    </div>

    <!-- JS script for dynamic actions -->
    <script>
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const changePasswordForm = document.getElementById('change-password-form');
        
        const showRegisterBtn = document.getElementById('show-register');
        const showLoginBtn = document.getElementById('show-login');
        const showChangePasswordBtn = document.getElementById('show-change-password');
        const showLoginFromChangeBtn = document.getElementById('show-login-from-change');
        
        const changeUsernameInput = document.getElementById('change-username');
        const usernameVerifyIndicator = document.getElementById('username-verify-indicator');
        
        const alertBox = document.getElementById('auth-alert');
        const alertMsg = alertBox.querySelector('.alert-message');

        function showAlert(msg, isSuccess = false) {
            alertBox.className = 'alert ' + (isSuccess ? 'alert-success' : 'alert-error');
            alertMsg.textContent = msg;
            alertBox.classList.remove('hidden');
        }

        function closeAlert() {
            alertBox.classList.add('hidden');
        }

        // Toggle functions
        showRegisterBtn.addEventListener('click', (e) => {
            e.preventDefault();
            closeAlert();
            loginForm.classList.add('hidden');
            changePasswordForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            registerForm.style.animation = 'slideIn 0.4s ease forwards';
        });

        showLoginBtn.addEventListener('click', (e) => {
            e.preventDefault();
            closeAlert();
            registerForm.classList.add('hidden');
            changePasswordForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
            loginForm.style.animation = 'slideIn 0.4s ease forwards';
        });

        showChangePasswordBtn.addEventListener('click', (e) => {
            e.preventDefault();
            closeAlert();
            loginForm.classList.add('hidden');
            registerForm.classList.add('hidden');
            changePasswordForm.classList.remove('hidden');
            changePasswordForm.style.animation = 'slideIn 0.4s ease forwards';
            changeUsernameInput.value = '';
            usernameVerifyIndicator.textContent = '';
        });

        showLoginFromChangeBtn.addEventListener('click', (e) => {
            e.preventDefault();
            closeAlert();
            registerForm.classList.add('hidden');
            changePasswordForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
            loginForm.style.animation = 'slideIn 0.4s ease forwards';
        });

        // Real-time username verification on blur
        changeUsernameInput.addEventListener('blur', async () => {
            const username = changeUsernameInput.value.trim();
            if (username.length < 3) {
                usernameVerifyIndicator.textContent = '';
                return;
            }
            usernameVerifyIndicator.textContent = 'Verifying...';
            usernameVerifyIndicator.style.color = 'var(--text-secondary)';
            
            try {
                const response = await fetch(`/api/verify-username?username=${encodeURIComponent(username)}`);
                if (response.ok) {
                    const result = await response.json();
                    if (result.exists) {
                        usernameVerifyIndicator.textContent = '✓ Verified';
                        usernameVerifyIndicator.style.color = 'var(--color-success)';
                    } else {
                        usernameVerifyIndicator.textContent = '✗ Not Found';
                        usernameVerifyIndicator.style.color = 'var(--color-secondary)';
                    }
                } else {
                    usernameVerifyIndicator.textContent = '✗ Error';
                    usernameVerifyIndicator.style.color = 'var(--color-secondary)';
                }
            } catch (err) {
                usernameVerifyIndicator.textContent = '✗ Offline';
                usernameVerifyIndicator.style.color = 'var(--color-secondary)';
            }
        });

        // Submit Login Form
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    showAlert('Success! Redirecting...', true);
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showAlert(result.message || 'Login failed.');
                }
            } catch (err) {
                showAlert('Network error. Please try again.');
            }
        });

        // Submit Register Form
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('register-username').value;
            const password = document.getElementById('register-password').value;
            const confirmPass = document.getElementById('register-confirm').value;

            if (password !== confirmPass) {
                showAlert('Passwords do not match.');
                return;
            }

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    showAlert('Account created! Redirecting...', true);
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showAlert(result.message || 'Registration failed.');
                }
            } catch (err) {
                showAlert('Network error. Please try again.');
            }
        });

        // Submit Change Password Form
        changePasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = changeUsernameInput.value.trim();
            const newPassword = document.getElementById('change-password').value;
            const confirmPassword = document.getElementById('change-confirm').value;

            if (newPassword !== confirmPassword) {
                showAlert('New passwords do not match.');
                return;
            }

            try {
                const response = await fetch('/api/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, new_password: newPassword, confirm_password: confirmPassword })
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    showAlert('Password updated successfully! Redirecting to login...', true);
                    setTimeout(() => {
                        // Switch back to login form
                        registerForm.classList.add('hidden');
                        changePasswordForm.classList.add('hidden');
                        loginForm.classList.remove('hidden');
                        loginForm.style.animation = 'slideIn 0.4s ease forwards';
                        closeAlert();
                    }, 1500);
                } else {
                    showAlert(result.message || 'Failed to change password.');
                }
            } catch (err) {
                showAlert('Network error. Please try again.');
            }
        });
    </script>
</body>
</html>
